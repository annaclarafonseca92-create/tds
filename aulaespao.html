    <script>
        function generateViewerCount() {
            return Math.floor(Math.random() * (920 - 700 + 1)) + 700;
        }

        function getTodayFormatted() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            return `${day}/${month}/${year}`;
        }

        const countElement = document.getElementById('liveCounter');
        const dateElement = document.getElementById('dateDisplay');

        if (countElement) countElement.textContent = generateViewerCount();
        if (dateElement) dateElement.textContent = getTodayFormatted();

        setInterval(function() {
            if (countElement) countElement.textContent = generateViewerCount();
        }, Math.random() * 5000 + 5000);
