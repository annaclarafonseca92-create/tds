    <style>
        /* ---------- BASE & VARIABLES ---------- */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0b0b1a;
            --bg-midtone: #1a1b3b;
            --primary-glow: #4cc9f0;
            --primary-glow-soft: #72d5fe;
            --font-color: #f0f3fa;
            --subtle-border: rgba(255, 255, 255, 0.3);
            --card-radius: 20px;
            --pill-radius: 50px;
            --ease-flow: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 30%, var(--bg-midtone) 0%, var(--bg-deep) 70%);
            background-attachment: fixed;
            color: var(--font-color);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- CONTAINER PRINCIPAL ---------- */
        .global-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }

        .core-layout {
            width: 100%;
            max-width: 780px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            animation: riseIn 0.8s ease-out both;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- PLAYER DE VÍDEO ---------- */
        .player-frame {
            width: 100%;
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            background: #000;
            transition: transform var(--ease-flow), box-shadow var(--ease-flow);
        }

        .player-frame:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 60px -5px rgba(76, 201, 240, 0.2), 0 0 0 1px rgba(76, 201, 240, 0.2);
        }

        vturb-smartplayer {
            display: block;
            width: 100%;
            aspect-ratio: 16/9;
        }

        /* ---------- TÍTULO ---------- */
        .hero-heading {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.02em;
            color: var(--font-color);
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
        }

        .hero-heading .accent-word {
            color: var(--primary-glow);
            position: relative;
            white-space: nowrap;
        }

        .hero-heading .accent-word::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-glow);
            opacity: 0.3;
            border-radius: 2px;
        }

        /* ---------- BOTÃO DE AÇÃO ---------- */
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #3a86ff 0%, #4cc9f0 100%);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1.1rem 2.8rem;
            border: none;
            border-radius: var(--pill-radius);
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 12px 30px rgba(76, 201, 240, 0.25);
            transition: all var(--ease-flow);
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #4cc9f0 0%, #3a86ff 100%);
            opacity: 0;
            transition: opacity var(--ease-flow);
        }

        .action-btn:hover::before {
            opacity: 1;
        }

        .action-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(76, 201, 240, 0.4);
        }

        .action-btn:active {
            transform: translateY(-1px);
        }

        .action-btn span,
        .action-btn .btn-icon {
            position: relative;
            z-index: 2;
        }

        .btn-icon {
            width: 1.3em;
            height: 1.3em;
            transition: transform var(--ease-flow);
        }

        .action-btn:hover .btn-icon {
            transform: translateX(5px);
        }

        /* ---------- RODAPÉ ---------- */
        .site-footer {
            margin-top: auto;
            padding: 2.5rem 1rem 1.5rem;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .legal-list {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            list-style: none;
        }

        .legal-list a {
            color: var(--subtle-border);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: color var(--ease-flow);
            position: relative;
        }

        .legal-list a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--primary-glow);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform var(--ease-flow);
        }

        .legal-list a:hover {
            color: #fff;
        }

        .legal-list a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* ---------- RESPONSIVO ---------- */
        @media (max-width: 600px) {
            .global-wrapper {
                padding: 2rem 1rem;
            }
            .core-layout {
                gap: 2rem;
            }
            .player-frame {
                border-radius: 14px;
            }
            .action-btn {
                width: 100%;
                max-width: 320px;
                justify-content: center;
                padding: 1rem 2rem;
                font-size: 1rem;
            }
            .legal-list {
                gap: 1.25rem;
            }
        }
    </style>
</head>

    <!-- Propagação de parâmetros da URL para os links -->
    <script>
        (function() {
            const searchParams = window.location.search;
            if (!searchParams) return;

            const cta = document.getElementById('mainCta');
            if (cta) {
                const base = cta.getAttribute('href');
                cta.setAttribute('href', base + searchParams);
            }

            const links = document.querySelectorAll('.legal-list a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('http')) {
                    link.setAttribute('href', href + searchParams);
                }
            });
        })();
    </script>
