<script>
function atualizarData(){
    let hoje=new Date();
    let dia=String(hoje.getDate()).padStart(2,'0');
    let mes=String(hoje.getMonth()+1).padStart(2,'0');
    let ano=hoje.getFullYear();

    document.getElementById("fecha").innerHTML=`${dia}/${mes}/${ano}`;
}

atualizarData();

function atualizarViewers(){
    let atual=parseInt(document.getElementById("viewers").innerText);

    let variacao=Math.floor(Math.random()*25)-12;

    atual+=variacao;

    if(atual<800)
        atual=800+Math.floor(Math.random()*50);

    if(atual>1200)
        atual=1200-Math.floor(Math.random()*50);

    document.getElementById("viewers").innerText=atual;
}

setInterval(atualizarViewers,7000);

// Passar parâmetros para todos os links
(function(){
    const params = window.location.search;

    if(!params) return;

    document.querySelectorAll("a").forEach(link=>{

        const href = link.getAttribute("href");

        if(!href || href.startsWith("#") || href.startsWith("javascript:"))
            return;

        link.href = href + (href.includes("?") ? "&" : "?") + params.substring(1);
    });

})();
</script>
